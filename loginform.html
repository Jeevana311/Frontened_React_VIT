<!DOCTYPE html>
<html>
<head>
    <title>Login Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e8f0f8;
            padding: 30px;
        }

        .container {
            width: 450px;
            margin: auto;
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #1a4d8f;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #aaa;
            border-radius: 5px;
            font-size: 15px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #1a73e8;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 25px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0d47a1;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Login Form</h1>

<form>

<label>Name</label>
<input type="text" placeholder="Enter your name" required>


<label>Email</label>
<input type="email" placeholder="Enter your email" required>


<label>Password</label>
<input type="password" placeholder="Enter your password" required>


<button type="submit">Login</button>


</form>

</div>

</body>
</html>
