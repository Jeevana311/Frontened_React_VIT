<!DOCTYPE html>
<html>
<head>
    <title>Student Profile Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .card img {
            border-radius: 50%;
            width: 150px;
            height: 150px;
        }

        .card h2 {
            margin-top: 15px;
            color: #333;
        }

        .card p {
            color: #777;
        }
        .card:hover{
    transform:scale(1.05);
    box-shadow:0 8px 20px rgb(219, 22, 143);
}
    </style>
</head>
<body>

<div class="card">
    <img src="https://media.istockphoto.com/id/2060009001/vector/avatar-user-profile-person-icon-profile-picture-for-social-media-profiles-icons-screensavers.jpg?s=612x612&w=0&k=20&c=onk7rmEoISSvHVlqc-SiBvcUr8ilCm2u9kcw3_Bm_SA=" alt="Profile Picture">
    <h2>Jeevana Sruthi</h2>
    <p>AI & Data Science</p>
</div>

</body>
</html>
